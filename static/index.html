<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>RWA Soluções | Acesso</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: 'Sora', Arial, sans-serif;
            color: #e8edf5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            background: #040e1e;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 90% 70% at 50% 45%, rgba(8,35,90,0.7) 0%, transparent 70%),
                linear-gradient(160deg, #020b1a 0%, #05142c 50%, #020b1a 100%);
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: -100%;
            background-image: repeating-linear-gradient(
                -52deg,
                transparent,
                transparent 70px,
                rgba(25,70,180,0.04) 70px,
                rgba(25,70,180,0.04) 71px
            );
            z-index: 0;
        }

        .wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }

        .login-card {
            width: 100%;
            background: rgba(8, 18, 38, 0.85);
            border: 1px solid rgba(50, 100, 220, 0.2);
            padding: 44px 42px 36px;
            border-radius: 20px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-title {
            font-size: 38px;
            font-weight: 800;
            letter-spacing: 4px;
            color: #ffffff;
            line-height: 1;
        }

        .logo-title span {
            color: #2563eb;
        }

        .logo-sub2 {
            display: block;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 8px;
            color: #c8d8f0;
            margin-top: 2px;
        }

        .logo-sub {
            display: block;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.22em;
            color: #2563eb;
            text-transform: uppercase;
            margin-top: 8px;
        }

        .welcome {
            text-align: center;
            margin-bottom: 28px;
        }

        .welcome h2 {
            font-size: 21px;
            font-weight: 700;
            color: #e8edf5;
            margin-bottom: 7px;
        }

        .welcome p {
            font-size: 13px;
            color: #7a8eaa;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: 600;
            color: #8fa0bb;
            letter-spacing: 0.04em;
        }

        .input-wrap {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 17px;
            height: 17px;
            opacity: 0.45;
            pointer-events: none;
        }

        .form-group input[type="email"],
        .form-group input[type="password"],
        .form-group input[type="text"] {
            width: 100%;
            padding: 13px 44px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            color: #e8edf5;
            font-family: 'Sora', Arial, sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }

        .form-group input::placeholder {
            color: #4a5a72;
            font-size: 13px;
        }

        .form-group input:focus {
            border-color: rgba(37, 99, 235, 0.6);
            background: rgba(37, 99, 235, 0.06);
        }

        .toggle-senha {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            opacity: 0.45;
            transition: opacity 0.2s;
            width: auto;
        }

        .toggle-senha:hover {
            opacity: 0.9;
            background: none;
        }

        .toggle-senha svg {
            width: 17px;
            height: 17px;
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
            font-size: 13px;
            color: #8fa0bb;
        }

        .options label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 13px;
            color: #8fa0bb;
        }

        .options input[type="checkbox"] {
            width: 15px;
            height: 15px;
            accent-color: #2563eb;
            cursor: pointer;
        }

        .options a {
            color: #4a90d9;
            text-decoration: none;
            font-size: 13px;
            transition: color 0.2s;
        }

        .options a:hover {
            color: #60a5fa;
        }

        button[type="submit"] {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            font-family: 'Sora', Arial, sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.2s, transform 0.1s;
            letter-spacing: 0.02em;
        }

        button[type="submit"]:hover {
            background: #1a4fc4;
        }

        button[type="submit"]:active {
            transform: scale(0.99);
        }

        .security {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            margin-top: 18px;
            color: #4a5a72;
            font-size: 12px;
        }

        .footer-divider {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.06);
            margin: 22px 0 16px;
        }

        .footer {
            text-align: center;
            color: #3a4a62;
            font-size: 11px;
            line-height: 1.7;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="login-card">

            <div class="logo">
                <div class="logo-title">RW<span>A</span></div>
                <div class="logo-sub2">SOLUÇÕES</div>
                <span class="logo-sub">Automação Fiscal Inteligente</span>
            </div>

            <div class="welcome">
                <h2>Bem-vindo de volta!</h2>
                <p>Acesse sua plataforma para gerenciar suas automações</p>
            </div>

            <form onsubmit="login(event)">

                <div class="form-group">
                    <label for="email">E-mail</label>
                    <div class="input-wrap">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="#e8edf5" stroke-width="1.8" stroke-linecap="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <input type="email" id="email" name="email" placeholder="seuemail@empresa.com.br" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <div class="input-wrap">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="#e8edf5" stroke-width="1.8" stroke-linecap="round">
                            <rect x="5" y="11" width="14" height="10" rx="2"/>
                            <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
                        </svg>
                        <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
                        <button type="button" class="toggle-senha" onclick="toggleSenha(this)" aria-label="Mostrar senha">
                            <svg viewBox="0 0 24 24" fill="none" stroke="#e8edf5" stroke-width="1.8" stroke-linecap="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="options">
                    <label>
                        <input type="checkbox" name="manter_conectado">
                        Manter conectado
                    </label>
                    <a href="/recuperar-senha">Esqueci minha senha</a>
                </div>

                <button type="submit">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                        <polyline points="10 17 15 12 10 7"/>
                        <line x1="15" y1="12" x2="3" y2="12"/>
                    </svg>
                    Entrar na Plataforma
                </button>

            </form>

            <div class="security">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#4a5a72" stroke-width="1.8" stroke-linecap="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
                Ambiente seguro e criptografado
            </div>

            <hr class="footer-divider">

            <div class="footer">
                Licenciado para uso profissional<br>
                RWA Soluções © 2026 - Todos os direitos reservados
            </div>

        </div>
    </div>

    <script>
        async function login(event) {
            event.preventDefault();

            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            const resposta = await fetch('/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    email: email,
                    senha: senha
                })
            });

            const dados = await resposta.json();

            alert(dados.mensagem);

            if (dados.status === 'ok') {
                console.log('Login autorizado');
            }
        }

        function toggleSenha(btn) {
            var input = document.getElementById('senha');
            input.type = input.type === 'password' ? 'text' : 'password';
            btn.style.opacity = input.type === 'text' ? '0.9' : '0.45';
        }
    </script>
</body>
</html>
